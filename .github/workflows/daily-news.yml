name: Daily Myanmar News Update

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests beautifulsoup4 lxml

      - run: python scripts/generate_news.py

      - run: |
          git config user.name "Myanmar News Bot"
          git config user.email "bot@auto.local"
          git add -A
          git diff --staged --quiet || git commit -m "Daily news: $(date +'%Y-%m-%d') auto"
          git push